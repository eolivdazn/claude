apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-match
  namespace: movie-match
  labels:
    app: movie-match
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movie-match
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: movie-match
    spec:
      containers:
        - name: app
          # Updated by CI: image: moviematchacr.azurecr.io/movie-match:<sha>
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: movie-match-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
