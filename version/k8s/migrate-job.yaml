# Run before each deployment to apply pending DB migrations.
# CI replaces PLACEHOLDER_IMAGE with the exact ACR image SHA being deployed.
apiVersion: batch/v1
kind: Job
metadata:
  name: movie-match-migrate
  namespace: movie-match
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: PLACEHOLDER_IMAGE
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: movie-match-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
